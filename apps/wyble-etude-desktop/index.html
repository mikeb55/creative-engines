<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimmy Wyble Etude Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 24px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 20px 0;
      color: #e94560;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e94560;
      color: white;
    }
    button:hover { background: #ff6b6b; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: #16213e;
      color: #eee;
    }
    button.secondary:hover { background: #0f3460; }
    .control-row {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control-row label { font-size: 13px; }
    .control-row select {
      padding: 6px 10px;
      font-size: 13px;
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      border-radius: 4px;
    }
    #status {
      padding: 12px;
      background: #16213e;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      min-height: 80px;
      white-space: pre-wrap;
    }
    #status.empty { color: #666; }
  </style>
</head>
<body>
  <h1>Wyble Etude Generator</h1>
  <div class="control-row">
    <label for="progression">Progression:</label>
    <select id="progression">
      <option value="ii_v_i">ii_v_i</option>
      <option value="jazz_cycle">jazz_cycle</option>
      <option value="blues_basic">blues_basic</option>
    </select>
  </div>
  <div class="buttons">
    <button id="generate">Generate Etudes</button>
    <button id="openFolder" class="secondary">Open Output Folder</button>
  </div>
  <div id="status" class="empty">Ready. Click Generate Etudes to create 10 studies (GCE ≥ 9).</div>
  <script src="renderer.js"></script>
</body>
</html>
