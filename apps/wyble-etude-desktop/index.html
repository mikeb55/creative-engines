<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimmy Wyble Etude Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 24px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 20px 0;
      color: #e94560;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e94560;
      color: white;
    }
    button:hover { background: #ff6b6b; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: #16213e;
      color: #eee;
    }
    button.secondary:hover { background: #0f3460; }
    .control-row {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control-row label { font-size: 13px; }
    .control-row select {
      padding: 6px 10px;
      font-size: 13px;
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      border-radius: 4px;
    }
    #status {
      padding: 12px;
      background: #16213e;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      min-height: 80px;
      white-space: pre-wrap;
    }
    #status.empty { color: #666; }
  </style>
</head>
<body>
  <h1>Wyble Etude Generator</h1>
  <div class="control-row">
    <label>Input:</label>
    <select id="inputMode">
      <option value="preset">Use preset progression</option>
      <option value="musicxml">Import MusicXML</option>
    </select>
  </div>
  <div class="control-row" id="presetRow">
    <label for="progression">Progression:</label>
    <select id="progression">
      <option value="ii_V_I_major">ii_V_I_major</option>
      <option value="minor_ii_V">minor_ii_V</option>
      <option value="jazz_blues">jazz_blues</option>
      <option value="minor_blues">minor_blues</option>
      <option value="rhythm_changes_A">rhythm_changes_A</option>
      <option value="autumn_leaves_fragment">autumn_leaves_fragment</option>
      <option value="solar_cycle">solar_cycle</option>
      <option value="giant_steps_fragment">giant_steps_fragment</option>
      <option value="beatrice_A">beatrice_A</option>
      <option value="orbit_A">orbit_A</option>
    </select>
  </div>
  <div class="control-row" id="musicxmlRow" style="display:none">
    <button id="pickMusicXml" class="secondary">Select MusicXML file...</button>
    <span id="musicxmlFileName" style="font-size:12px;color:#888"></span>
  </div>
  <div class="control-row">
    <label for="practiceMode">Practice mode:</label>
    <select id="practiceMode">
      <option value="etude">etude</option>
      <option value="exercise">exercise</option>
      <option value="improvisation">improvisation</option>
    </select>
  </div>
  <div class="buttons">
    <button id="generate">Generate Etudes</button>
    <button id="openFolder" class="secondary">Open Latest Output Folder</button>
  </div>
  <div id="status" class="empty">Ready. One click generates 40 candidates and exports the top 3.</div>
  <script src="renderer.js"></script>
</body>
</html>
